name: Monthly Data Update

on:
  schedule:
    - cron: '17 4 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Deps
        run: pip install pandas numpy pyarrow requests

      - name: Update Shareholder Count
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from config import A_STOCK_DIR
          from src.data.storage import read_daily_bars
          import pandas as pd, requests, time
          from datetime import date, timedelta
          end=date.today();start=end-timedelta(days=365*3)
          syms=sorted(read_daily_bars(A_STOCK_DIR,start_date=start,end_date=end,market='a_stock')['symbol'].unique())
          try:
              old=pd.read_parquet('.cache_holder_all.parquet')
              done=set(old['symbol'].unique()); rows=old.to_dict('records')
          except: done=set(); rows=[]
          todo=[s for s in syms if s not in done]
          print(f'股东户数: 已有{len(done)} 待拉{len(todo)}')
          for i,code in enumerate(todo):
              try:
                  r=requests.get('https://datacenter.eastmoney.com/securities/api/data/v1/get',
                      params={'reportName':'RPT_F10_EH_HOLDERNUM','columns':'SECURITY_CODE,END_DATE,HOLDER_TOTAL_NUM',
                      'filter':f'(SECURITY_CODE=\"{code}\")','pageNumber':1,'pageSize':20,
                      'sortTypes':-1,'sortColumns':'END_DATE','source':'HSF10','client':'PC'},
                      headers={'User-Agent':'Mozilla/5.0'},timeout=8)
                  if r.json().get('success'):
                      for row in r.json()['result']['data']:
                          rows.append({'symbol':code,'end_date':row['END_DATE'][:10],'holder_num':int(row['HOLDER_TOTAL_NUM'])})
              except: pass
              if (i+1)%500==0: pd.DataFrame(rows).to_parquet('.cache_holder_all.parquet'); print(f'[{i+1}/{len(todo)}] {len(rows)}条')
              time.sleep(0.04)
          pd.DataFrame(rows).to_parquet('.cache_holder_all.parquet')
          print(f'完成:{len(rows)}条')
          "

      - name: Update Announcements
        run: python scripts/download_announce.py

      - name: Commit
        run: |
          git config user.name "khquant-bot"
          git config user.email "bot@khquant.local"
          git add .cache_holder_all.parquet .cache_announce.parquet
          git diff --staged --quiet || git commit -m "data: monthly update $(date +%Y-%m)"
          git push || true
