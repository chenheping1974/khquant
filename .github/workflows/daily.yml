name: Daily Inference

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 北京时间 20:00
  workflow_dispatch:

jobs:
  infer:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Deps
        run: pip install pandas numpy pyarrow requests akshare python-dotenv

      - name: Cache Financial Data
        uses: actions/cache@v4
        with:
          path: .cache_fin_200.parquet
          key: fin-data-v1

      - name: Debug Path
        run: |
          pwd
          ls src/data/storage.py
          python -c "import sys; sys.path.insert(0,'.'); print(sys.path[:5]); from src.data.storage import read_daily_bars; print('OK')"

      - name: Daily Inference
        run: python scripts/daily_inference.py

      - name: Upload Signals
        uses: actions/upload-artifact@v4
        with:
          name: daily-signals
          path: results/
          retention-days: 30
