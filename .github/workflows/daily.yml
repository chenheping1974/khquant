name: Daily Pipeline

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 北京时间 20:00
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/khquant-data
          path: khquant-data
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Deps
        run: pip install pandas numpy pyarrow requests akshare python-dotenv

      - name: Fetch Today's Data (Sina)
        env:
          KHQUANT_DATA_PATH: ${{ github.workspace }}/khquant-data
        run: python scripts/fetch_incremental.py

      - name: Commit & Push Data
        working-directory: khquant-data
        run: |
          git config user.name "khquant-bot"
          git config user.email "bot@khquant.local"
          git add .
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m-%d) daily update"
          git push

      - name: Daily Inference
        env:
          KHQUANT_DATA_PATH: ${{ github.workspace }}/khquant-data
        run: python scripts/daily_inference.py

      - name: Commit Results
        run: |
          git config user.name "khquant-bot"
          git config user.email "bot@khquant.local"
          git add results/latest.json results/signals-*.txt
          git diff --staged --quiet || git commit -m "signals: $(date +%Y-%m-%d) daily picks"
          git push

      - name: Upload Signals
        uses: actions/upload-artifact@v4
        with:
          name: daily-signals
          path: results/
          retention-days: 30
